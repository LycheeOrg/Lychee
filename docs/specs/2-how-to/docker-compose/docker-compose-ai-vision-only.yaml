services:
  ai_vision:
    expose:
      - "${APP_PORT_AI_FACE:-8001}"
    ports:
      - "${APP_PORT_AI_FACE:-8001}:8000"
    # build:
    #   context: ./ai-vision-service
    # container_name: lychee-ai-vision
    image: lychee-ai-vision
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      VISION_FACE_LYCHEE_API_URL: "${AI_VISION_FACE_LYCHEE_API_URL:-http://lychee_api:8000}"
      VISION_FACE_API_KEY: "${AI_VISION_API_KEY:-changeme}"
      VISION_FACE_VERIFY_SSL: "${AI_VISION_VERIFY_SSL:-true}"
      VISION_FACE_PHOTOS_PATH: "/data/photos"
      VISION_FACE_STORAGE_PATH: "/data/embeddings"
      VISION_FACE_WORKERS: "${AI_VISION_WORKERS:-1}"
    volumes:
      - ../../../../public/uploads:/data/photos:ro
      - ai_vision_embeddings:/data/embeddings
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
        - local


volumes:
    ai_vision_embeddings:
        name: lychee_ai_vision_embeddings
        driver: local

networks:
    local:
        driver: bridge